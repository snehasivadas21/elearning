name: Deploy PyTech

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 98.70.36.59 >> ~/.ssh/known_hosts

      - name: Deploy to GCP VM
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no azureuser@98.70.36.59 "~/deploy.sh"